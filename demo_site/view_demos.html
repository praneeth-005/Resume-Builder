<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Forge Demo Videos</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #111827;
        }
        h1 { margin-bottom: 5px; }
        p { color: #6b7280; margin-bottom: 30px; }
        .video-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            margin-bottom: 40px;
            max-width: 1200px;
            width: 100%;
        }
        h2 { font-size: 1.25rem; margin-top: 0; color: #374151; border-bottom: 1px solid #e5e7eb; padding-bottom: 10px; }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            display: block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Resume Forge Demos</h1>
    <p>Both recordings demonstrate the live functionality of the application.</p>

    <div class="video-container">
        <h2>Demo 1: Comprehensive Walkthrough</h2>
        <img src="resume_full_demo.webp" alt="Full Application Demo" />
    </div>

    <div class="video-container">
        <h2>Demo 2: Enhance with AI Feature</h2>
        <img src="resume_ai_demo.webp" alt="AI Feature Demo" />
    </div>
